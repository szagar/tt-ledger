name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests + dual-dialect migrations
    runs-on: ubuntu-latest

    # Throwaway Postgres for the dual-dialect guarantee.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ledger
          POSTGRES_PASSWORD: ledger
          POSTGRES_DB: ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # asyncpg URL for the throwaway Postgres above
      PG_URL: postgresql+asyncpg://ledger:ledger@localhost:5432/ledger_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install package (dev + postgres + securities + tastytrade + api + cli extras)
        # [securities] pulls security-universe from GitHub (not yet on PyPI). No --system: setup-uv
        # already provisions and activates a venv (VIRTUAL_ENV), and --system fights that under
        # PEP 668 ("externally managed environment"). tastytrade/api/cli are required too -- their
        # optional deps (websockets/fastapi/typer/rich) are imported at module load by
        # test_ingest_tastytrade_stream.py / test_api.py / test_cli.py.
        run: uv pip install -e ".[dev,postgres,securities,tastytrade,api,cli]"

      - name: Unit + smoke tests (SQLite and Postgres)
        env:
          TT_LEDGER_TEST_PG: ${{ env.PG_URL }}   # conftest adds this URL to the store_url fixture
        run: pytest -q

      - name: Migrations — SQLite (upgrade head)
        env:
          TT_LEDGER_DATABASE_URL: sqlite+aiosqlite:///./ci_sqlite.db
        run: alembic upgrade head

      - name: Migrations — installed-package entry point (tt-ledger db upgrade, idempotent)
        # No alembic.ini / repo checkout needed — the path a host platform uses when it
        # installs tt-ledger as a wheel/git dependency (schema/migrate.py).
        run: |
          tt-ledger --url sqlite+aiosqlite:///./ci_cli.db db upgrade
          tt-ledger --url sqlite+aiosqlite:///./ci_cli.db db upgrade

      - name: Reset the Postgres schema
        # The pytest step's fixtures create/drop tables directly via SQLAlchemy metadata (not
        # alembic) against this same throwaway database, leaving tables behind with no
        # version-table row -- `alembic upgrade head` below needs a genuinely clean schema to
        # prove it can build one from scratch (the actual point of this dual-dialect guarantee).
        # On Postgres every ledger table lives in the dedicated "ledger" schema (schema/namespace.py).
        env:
          PGPASSWORD: ledger
        run: psql -h localhost -U ledger -d ledger_test -c 'DROP SCHEMA IF EXISTS "ledger" CASCADE; DROP SCHEMA public CASCADE; CREATE SCHEMA public;'

      - name: Migrations — Postgres (upgrade head)   # the dual-dialect guarantee
        env:
          TT_LEDGER_DATABASE_URL: ${{ env.PG_URL }}
        run: alembic upgrade head

      - name: Migrations — Postgres round-trip (downgrade base -> upgrade head)
        env:
          TT_LEDGER_DATABASE_URL: ${{ env.PG_URL }}
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Assert Postgres uses NUMERIC for Money columns (not INTEGER)
        env:
          PGPASSWORD: ledger
        run: |
          # The Money decorator must render NUMERIC on Postgres (docs/storage.md). Fail if any
          # money column came through as integer/bigint.
          got=$(psql -h localhost -U ledger -d ledger_test -tAc \
            "select data_type from information_schema.columns
             where table_schema='ledger' and table_name='securities' and column_name='strike'")
          echo "ledger.securities.strike data_type = '$got'"
          test "$got" = "numeric"

      - name: Assert ledger tables + version table live in the "ledger" schema
        env:
          PGPASSWORD: ledger
        run: |
          # The namespace guarantee (schema/namespace.py): nothing from tt-ledger lands in
          # public, and the version table is tt_ledger_alembic_version inside the schema.
          leaked=$(psql -h localhost -U ledger -d ledger_test -tAc \
            "select count(*) from information_schema.tables
             where table_schema='public'")
          echo "tables in public = $leaked"
          test "$leaked" = "0"
          vt=$(psql -h localhost -U ledger -d ledger_test -tAc \
            "select count(*) from information_schema.tables
             where table_schema='ledger' and table_name='tt_ledger_alembic_version'")
          test "$vt" = "1"
