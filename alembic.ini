# Alembic config for tt-ledger.
# The DB URL is NOT set here — env.py reads TT_LEDGER_DATABASE_URL
# (default sqlite+aiosqlite:///ledger.db), so the same migrations run on SQLite or Postgres.

[alembic]
script_location = tt_ledger/schema/migrations
prepend_sys_path = .
path_separator = os

# Logging --------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
